name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  id-token: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            arch: amd64
          - target: aarch64-unknown-linux-musl
            arch: arm64

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # Static musl binaries (zero glibc dependency) so the agent/API/CLI run on
      # the whole support matrix regardless of distro libc version — Debian 11/12,
      # Ubuntu 20.04+, CentOS/Rocky 9, Amazon Linux 2023 (#70). cargo-zigbuild uses
      # Zig's bundled clang as the C cross-compiler, which builds aws-lc-sys (the
      # only C dependency in the tree) statically for both musl targets from a
      # single x86_64 runner. The rest of the TLS stack is pure rustls.
      - name: Install Zig
        uses: mlugg/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install cargo-zigbuild
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-zigbuild

      - name: Cache Rust dependencies
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            panel/agent/target/
            panel/backend/target/
            panel/cli/target/
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build agent (static musl)
        run: cargo zigbuild --release --target ${{ matrix.target }} --manifest-path panel/agent/Cargo.toml

      - name: Build API (static musl)
        run: cargo zigbuild --release --target ${{ matrix.target }} --manifest-path panel/backend/Cargo.toml

      - name: Build CLI (static musl)
        run: cargo zigbuild --release --target ${{ matrix.target }} --manifest-path panel/cli/Cargo.toml

      - name: Package binaries
        run: |
          mkdir -p release
          cp panel/agent/target/${{ matrix.target }}/release/dockpanel-agent release/dockpanel-agent-linux-${{ matrix.arch }}
          cp panel/backend/target/${{ matrix.target }}/release/dockpanel-api release/dockpanel-api-linux-${{ matrix.arch }}
          cp panel/cli/target/${{ matrix.target }}/release/dockpanel release/dockpanel-cli-linux-${{ matrix.arch }}
          chmod +x release/*

          # Report binary sizes + confirm static linkage
          echo "Binary sizes (${{ matrix.arch }}):"
          ls -lh release/
          echo "Linkage check:"
          file release/dockpanel-agent-linux-${{ matrix.arch }}

      - name: Install cargo-sbom
        if: matrix.arch == 'amd64'
        run: cargo install cargo-sbom --locked --version ^0.10 --force

      - name: Generate SBOMs (SPDX JSON)
        if: matrix.arch == 'amd64'
        run: |
          cargo sbom --project-directory panel/agent   --output-format spdx_json_2_3 > release/dockpanel-agent.spdx.json
          cargo sbom --project-directory panel/backend --output-format spdx_json_2_3 > release/dockpanel-api.spdx.json
          cargo sbom --project-directory panel/cli     --output-format spdx_json_2_3 > release/dockpanel-cli.spdx.json

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.arch }}
          path: release/

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Build frontend
        run: |
          cd panel/frontend
          npm ci
          npx vite build

      - name: Package frontend
        run: |
          cd panel/frontend
          tar czf ../../dockpanel-frontend.tar.gz dist/

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: frontend
          path: dockpanel-frontend.tar.gz

  release:
    needs: [build, frontend]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/

      - name: Prepare release assets
        run: |
          mkdir -p release
          cp artifacts/binaries-amd64/* release/
          cp artifacts/binaries-arm64/* release/
          cp artifacts/frontend/dockpanel-frontend.tar.gz release/

          # Create checksums (over binaries + SBOMs, before signatures)
          cd release
          sha256sum dockpanel-* > checksums.txt

          echo "Release contents:"
          ls -lh

      - name: Install cosign (pinned v2.4.1, retried + checksum-verified)
        continue-on-error: true
        run: |
          set -euo pipefail
          # s232: sigstore/cosign-installer's single un-retried fetch got a
          # connection reset and aborted the WHOLE release job before publish —
          # the tag existed but no release object did. Install cosign ourselves
          # with retries + a fail-closed checksum against Sigstore's own published
          # sums, and make the step non-fatal so a total Sigstore outage ships an
          # unsigned release instead of losing the publish entirely.
          COSIGN_VERSION=v2.4.1
          BASE="https://github.com/sigstore/cosign/releases/download/${COSIGN_VERSION}"
          ok=0
          for attempt in 1 2 3 4 5; do
            if curl -fsSL --retry 3 --retry-delay 5 -o /tmp/cosign "${BASE}/cosign-linux-amd64" \
               && curl -fsSL --retry 3 --retry-delay 5 -o /tmp/cosign_checksums.txt "${BASE}/cosign_checksums.txt" \
               && grep ' cosign-linux-amd64$' /tmp/cosign_checksums.txt \
                    | sed 's#cosign-linux-amd64#/tmp/cosign#' | sha256sum -c -; then
              ok=1; break
            fi
            echo "cosign install attempt ${attempt} failed; retrying in 15s..."
            rm -f /tmp/cosign /tmp/cosign_checksums.txt
            sleep 15
          done
          if [ "$ok" != "1" ]; then
            echo "::warning::cosign install failed after 5 attempts — this release will publish UNSIGNED"
            echo "⚠️ cosign install failed — this release is UNSIGNED" >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
          chmod +x /tmp/cosign
          sudo mv /tmp/cosign /usr/local/bin/cosign
          cosign version

      - name: Sign release assets (keyless via Sigstore)
        continue-on-error: true
        run: |
          cd release
          for f in $(ls | grep -v '\.sig$' | grep -v '\.pem$'); do
            echo "Signing $f"
            cosign sign-blob --yes \
              --output-signature "${f}.sig" \
              --output-certificate "${f}.pem" \
              "$f"
          done
          echo "Signed assets:"
          ls -lh *.sig *.pem

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            release/*

  # The #70 ABI/loader guard. It has to be called from here: publishing with the
  # default GITHUB_TOKEN does not raise a `release: published` event that can
  # start another workflow, so smoke-test.yml's own trigger never fires.
  smoke-test:
    needs: release
    uses: ./.github/workflows/smoke-test.yml
    with:
      tag: ${{ github.ref_name }}
